services:
  backend:
    build: ./backend
    container_name: doc2md-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: doc2md-frontend
    ports:
      - "8080:4173"
    depends_on:
      - backend
    restart: unless-stopped
